<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Mastery Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --card: #141c2e;
    --border: #1e2d47;
    --border2: #2a3f5f;
    --text: #e8edf5;
    --muted: #7a8ba8;
    --accent: #3b82f6;
    --accent2: #6366f1;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --purple: #a855f7;
    --cyan: #06b6d4;
    --pink: #ec4899;
    --orange: #f97316;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }
  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    border-bottom: 1px solid var(--border2);
    padding: 40px 32px 32px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -80px; left: 20%;
    width: 400px; height: 200px;
    background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
  }
  .header-top {
    display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
  }
  .logo {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600; font-size: 18px; color: #fff;
  }
  .header h1 {
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, #e8edf5, #818cf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .stats-bar {
    display: flex; gap: 24px; flex-wrap: wrap;
    position: relative; z-index: 1;
  }
  .stat {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }

  /* FILTER BAR */
  .filter-bar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-family: 'Sora', sans-serif;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn.beg { --acc: var(--green); }
  .filter-btn.int { --acc: var(--yellow); }
  .filter-btn.adv { --acc: var(--red); }
  .filter-btn.beg.active { background: var(--green); border-color: var(--green); }
  .filter-btn.int.active { background: var(--yellow); border-color: var(--yellow); color: #000; }
  .filter-btn.adv.active { background: var(--red); border-color: var(--red); }
  .search-box {
    margin-left: auto;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    outline: none;
    width: 200px;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  /* MAIN LAYOUT */
  .container { padding: 32px; max-width: 1400px; margin: 0 auto; }
  .progress-overview {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 32px;
  }
  .prog-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .prog-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .prog-card.active-topic { border-color: var(--accent2); }
  .prog-icon { font-size: 22px; margin-bottom: 8px; }
  .prog-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .prog-count { font-size: 11px; color: var(--muted); }
  .prog-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; }
  .prog-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

  /* TOPIC SECTION */
  .topic-section { margin-bottom: 48px; }
  .topic-header {
    display: flex; align-items: flex-start; gap: 16px;
    margin-bottom: 24px;
    padding: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
  }
  .topic-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
  }
  .topic-icon-big {
    width: 52px; height: 52px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .topic-meta { flex: 1; }
  .topic-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .topic-desc { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
  .prereq-block {
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .prereq-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--accent); margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .prereq-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .prereq-tag {
    padding: 3px 10px; border-radius: 12px;
    background: rgba(59,130,246,0.12);
    border: 1px solid rgba(59,130,246,0.25);
    color: #93c5fd; font-size: 11px; font-weight: 600;
  }
  .yt-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .yt-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 8px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    color: #fca5a5; font-size: 11px; font-weight: 600;
    text-decoration: none;
    transition: background 0.2s;
  }
  .yt-link:hover { background: rgba(239,68,68,0.2); }
  .yt-link::before { content: '▶'; font-size: 9px; }
  .topic-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 8px; }

  /* QUESTIONS GRID */
  .questions-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
  }
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 12px;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
    position: relative;
  }
  .q-card:hover { border-color: var(--border2); background: var(--bg3); }
  .q-card.solved { border-color: rgba(16,185,129,0.3); }
  .q-card.solved::after {
    content: '✓';
    position: absolute; top: 8px; right: 10px;
    color: var(--green); font-size: 12px; font-weight: 700;
  }
  .q-check {
    width: 18px; height: 18px; border-radius: 4px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .q-card.solved .q-check { background: var(--green); border-color: var(--green); }
  .q-card.solved .q-check::after { content: '✓'; color: #fff; font-size: 10px; font-weight: 700; }
  .q-info { flex: 1; min-width: 0; }
  .q-name {
    font-size: 13px; font-weight: 600; color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .q-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .difficulty {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .easy { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.25); }
  .medium { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.25); }
  .hard { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.25); }
  .q-link {
    font-size: 11px; color: var(--accent); text-decoration: none;
    border: 1px solid rgba(59,130,246,0.3);
    padding: 2px 8px; border-radius: 6px;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .q-link:hover { background: rgba(59,130,246,0.1); }
  .q-tag {
    font-size: 10px; color: var(--muted);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 2px 7px; border-radius: 5px;
  }

  /* SUBSECTION LABELS */
  .sub-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted);
    padding: 16px 0 8px;
    display: flex; align-items: center; gap: 8px;
    border-top: 1px solid var(--border);
    margin-top: 16px;
  }
  .sub-label:first-child { border-top: none; margin-top: 0; }
  .sub-label span {
    background: var(--border); height: 1px; flex: 1;
  }

  /* LEVEL SECTIONS */
  .level-section { margin-bottom: 20px; }

  /* PROGRESS COUNTER */
  .solved-counter {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 14px 20px;
    font-size: 13px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 200;
  }
  .solved-counter strong { color: var(--green); font-size: 18px; font-family: 'JetBrains Mono'; }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 600px) {
    .container { padding: 16px; }
    .header { padding: 24px 16px; }
    .filter-bar { padding: 10px 16px; }
    .questions-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">&lt;/&gt;</div>
    <div>
      <h1>DSA Mastery Sheet</h1>
      <p>Beginner → Advanced · Concept-wise · LeetCode Practice</p>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat"><div><div class="stat-num" id="total-q">350+</div><div class="stat-label">Questions</div></div></div>
    <div class="stat"><div><div class="stat-num" id="solved-count">0</div><div class="stat-label">Solved</div></div></div>
    <div class="stat"><div><div class="stat-num">16</div><div class="stat-label">Topics</div></div></div>
    <div class="stat"><div><div class="stat-num">3</div><div class="stat-label">Levels</div></div></div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterLevel('all')">All</button>
  <button class="filter-btn beg" onclick="filterLevel('Easy')">🟢 Beginner</button>
  <button class="filter-btn int" onclick="filterLevel('Medium')">🟡 Intermediate</button>
  <button class="filter-btn adv" onclick="filterLevel('Hard')">🔴 Advanced</button>
  <input class="search-box" id="search" placeholder="Search questions..." oninput="searchQ()" />
</div>

<div class="container">
  <div class="progress-overview" id="topic-nav"></div>
  <div id="topics-container"></div>
</div>

<div class="solved-counter">
  ✅ <strong id="sc2">0</strong> / <span id="total-display">0</span> solved
</div>

    prereqs: ["All previous topics", "Graph algorithms", "DP"],
    youtube: [
      { title: "Segment Tree - WilliamFiset", url: "https://www.youtube.com/watch?v=ZBHKZF5w4YU" },

let solved = new Set(JSON.parse(localStorage.getItem('dsa_solved') || '[]'));
let activeLevel = 'all';
let activeTopicFilter = null;

function saveSolved() {
  localStorage.setItem('dsa_solved', JSON.stringify([...solved]));
}

function countTotal() {
  return DSA.reduce((a, t) => a + t.questions.length, 0);
}

function buildNav() {
  const nav = document.getElementById('topic-nav');
  const colors = ['#3b82f6','#06b6d4','#8b5cf6','#f59e0b','#ec4899','#10b981','#f97316','#6366f1','#a855f7','#ef4444','#06b6d4','#f59e0b','#10b981','#64748b','#8b5cf6','#ef4444'];
  nav.innerHTML = DSA.map((t, i) => {
    const solvedCount = t.questions.filter(q => solved.has(q.url)).length;
    const pct = Math.round((solvedCount / t.questions.length) * 100);
    return `<div class="prog-card" onclick="scrollToTopic('${t.id}')" id="nav-${t.id}">
      <div class="prog-icon">${t.icon}</div>
      <div class="prog-name">${t.name}</div>
      <div class="prog-count">${solvedCount}/${t.questions.length} solved</div>
      <div class="prog-bar"><div class="prog-fill" id="fill-${t.id}" style="width:${pct}%;background:${t.color}"></div></div>
    </div>`;
  }).join('');
}

function buildTopics() {
  const container = document.getElementById('topics-container');
  container.innerHTML = DSA.map(t => {
    const ytLinks = t.youtube.map(y =>
      `<a class="yt-link" href="${y.url}" target="_blank">${y.title}</a>`
    ).join('');

    const questions = t.questions.map(q => {
      const isSolved = solved.has(q.url);
      return `<div class="q-card ${isSolved ? 'solved' : ''}" onclick="toggleSolved(this, '${q.url}')" id="qcard-${btoa(q.url).replace(/=/g,'').replace(/\+/g,'').replace(/\//g,'')}">
        <div class="q-check"></div>
        <div class="q-info">
          <div class="q-name" title="${q.name}">${q.name}</div>
          <div class="q-meta">
            <span class="difficulty ${q.diff.toLowerCase()}">${q.diff}</span>
            <span class="q-tag">${q.tag}</span>
          </div>
        </div>
        <a class="q-link" href="${q.url}" target="_blank" onclick="event.stopPropagation()">LC →</a>
      </div>`;
    }).join('');

    return `<div class="topic-section" id="topic-${t.id}" data-topic="${t.id}">
      <div class="topic-header" style="border-top-color:${t.color}">
        <div class="topic-icon-big" style="background:${t.color}22; border:1px solid ${t.color}44">${t.icon}</div>
        <div class="topic-meta">
          <div class="topic-name" style="color:${t.color}">${t.name}</div>
          <div class="topic-desc">${t.desc}</div>
          <div class="prereq-block">
            <div class="prereq-title">⚡ Prerequisites</div>
            <div class="prereq-tags">${t.prereqs.map(p => `<span class="prereq-tag">${p}</span>`).join('')}</div>
          </div>
          <div class="yt-links">${ytLinks}</div>
        </div>
      </div>
      <div class="questions-grid" id="grid-${t.id}">${questions}</div>
    </div>`;
  }).join('');
}

function toggleSolved(card, url) {
  if (solved.has(url)) {
    solved.delete(url);
    card.classList.remove('solved');
  } else {
    solved.add(url);
    card.classList.add('solved');
  }
  saveSolved();
  updateCounts();
}

function updateCounts() {
  const sc = solved.size;
  document.getElementById('solved-count').textContent = sc;
  document.getElementById('sc2').textContent = sc;
  DSA.forEach(t => {
    const solvedCount = t.questions.filter(q => solved.has(q.url)).length;
    const pct = Math.round((solvedCount / t.questions.length) * 100);
    const fill = document.getElementById('fill-' + t.id);
    if (fill) fill.style.width = pct + '%';
    const navCard = document.querySelector(`#nav-${t.id} .prog-count`);
    if (navCard) navCard.textContent = `${solvedCount}/${t.questions.length} solved`;
  });
}

function filterLevel(level) {
  activeLevel = level;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  applyFilters();
}

function searchQ() {
  applyFilters();
}

function applyFilters() {
  const query = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.q-card').forEach(card => {
    const name = card.querySelector('.q-name').textContent.toLowerCase();
    const tag = card.querySelector('.q-tag').textContent.toLowerCase();
    const diff = card.querySelector('.difficulty').textContent;
    const levelMatch = activeLevel === 'all' || diff === activeLevel;
    const searchMatch = !query || name.includes(query) || tag.includes(query);
    card.classList.toggle('hidden', !levelMatch || !searchMatch);
  });
}

function scrollToTopic(id) {
  const el = document.getElementById('topic-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Init
const total = countTotal();
document.getElementById('total-q').textContent = total + '+';
document.getElementById('total-display').textContent = total;
buildNav();
buildTopics();
updateCounts();
</script>
</body>
